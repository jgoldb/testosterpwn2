<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TESTOSTERPWN: Multiplayer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #game-container { position: relative; }
  #game-container.locked, #game-container.locked canvas,
  body.locked { cursor: none; }

  /* Countdown overlay */
  #countdown-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 90;
  }
  #countdown-overlay .countdown-text {
    font-size: 72px;
    color: #0ff;
    text-shadow: 0 0 30px #0ff, 0 0 60px #0ff;
    letter-spacing: 10px;
  }
  #countdown-overlay .countdown-sub {
    font-size: 16px;
    color: #0f0;
    text-shadow: 0 0 10px #0f0;
    letter-spacing: 4px;
    margin-top: 10px;
  }

  /* Death overlay */
  #death-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(80,0,0,0.5);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 80;
    pointer-events: none;
  }
  #death-overlay .death-text {
    font-size: 36px;
    color: #f44;
    text-shadow: 0 0 20px #f44;
    letter-spacing: 8px;
  }
  #death-overlay .death-sub {
    font-size: 14px;
    color: #f88;
    letter-spacing: 3px;
    margin-top: 10px;
  }

  /* Kill feed */
  #kill-feed {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 70;
    pointer-events: none;
  }
  .kill-feed-entry {
    font-size: 12px;
    color: #ccc;
    letter-spacing: 1px;
    margin-bottom: 3px;
    opacity: 1;
    transition: opacity 0.5s;
    text-shadow: 0 0 4px #000, 0 0 8px #000;
  }
  .kill-feed-entry .kf-killer { color: #0f0; }
  .kill-feed-entry .kf-victim { color: #f44; }
  .kill-feed-entry .kf-arrow { color: #ff0; }
  .kill-feed-entry .kf-hs { color: #f80; font-weight: bold; }

  /* Score screen overlay */
  #score-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    cursor: default;
  }
  #score-overlay .score-title {
    font-size: 36px;
    letter-spacing: 8px;
    margin-bottom: 8px;
    text-shadow: 0 0 20px currentColor;
  }
  #score-overlay .score-title.victory { color: #0f0; }
  #score-overlay .score-title.defeat { color: #f44; }
  #score-overlay .score-title.draw { color: #ff0; }
  #score-overlay .score-mode {
    font-size: 14px;
    color: #888;
    letter-spacing: 3px;
    margin-bottom: 24px;
  }
  .score-table {
    border-collapse: collapse;
    margin-bottom: 30px;
  }
  .score-table th {
    color: #0ff;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-bottom: 1px solid #0ff3;
    text-align: left;
  }
  .score-table td {
    font-size: 13px;
    padding: 6px 16px;
    border-bottom: 1px solid #1a1a2a;
  }
  .score-table .st-name { color: #ccc; }
  .score-table .st-self { color: #0ff; font-weight: bold; }
  .score-table .st-team0 { color: #0ff; }
  .score-table .st-team1 { color: #f0a; }
  .score-table .st-kills { color: #0f0; }
  .score-table .st-deaths { color: #f44; }
  .score-table .st-damage { color: #ff0; }
  .score-table .st-headshots { color: #f80; }
  .score-lobby-btn {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    color: #0ff;
    background: transparent;
    border: 2px solid #0ff;
    padding: 12px 36px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 4px;
    transition: all 0.3s;
    text-shadow: 0 0 10px #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.3);
  }
  .score-lobby-btn:hover {
    background: rgba(0,255,255,0.15);
    box-shadow: 0 0 30px rgba(0,255,255,0.5);
  }

  /* Player scoreboard HUD (top-right) */
  #player-hud {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 60;
    pointer-events: none;
  }
  .phud-entry {
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-shadow: 0 0 4px #000, 0 0 8px #000;
  }
  .phud-name { min-width: 70px; }
  .phud-hp-bar {
    width: 50px;
    height: 4px;
    background: #222;
    position: relative;
  }
  .phud-hp-fill {
    height: 100%;
    transition: width 0.2s;
  }
  .phud-dead { text-decoration: line-through; opacity: 0.4; }

  /* Options overlay (ESC menu) */
  #options-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.65);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 85;
    cursor: default;
  }
  #options-overlay .options-title {
    font-size: 28px;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    letter-spacing: 8px;
    margin-bottom: 30px;
    text-transform: uppercase;
  }
  #options-overlay .options-group {
    margin-bottom: 20px;
    width: 280px;
  }
  #options-overlay .options-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #0f0;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #options-overlay .options-value {
    color: #0ff;
    min-width: 36px;
    text-align: right;
  }
  #options-overlay input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: #222;
    border-radius: 2px;
    outline: none;
  }
  #options-overlay input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #0ff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,255,255,0.6);
  }
  #options-overlay input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #0ff;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(0,255,255,0.6);
  }
  #options-overlay .options-resume {
    margin-top: 20px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #0f0;
    background: transparent;
    border: 2px solid #0f0;
    padding: 10px 32px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 4px;
    transition: all 0.3s;
    text-shadow: 0 0 10px #0f0;
    box-shadow: 0 0 15px rgba(0,255,0,0.3);
  }
  #options-overlay .options-resume:hover {
    background: rgba(0,255,0,0.15);
    box-shadow: 0 0 30px rgba(0,255,0,0.5);
  }
  #options-overlay .options-hint {
    margin-top: 16px;
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
  }
  #options-overlay .options-hint span { color: #0ff; }
  #options-overlay .options-lobby-link {
    margin-top: 20px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #f0a;
    letter-spacing: 2px;
    text-decoration: none;
    border: 1px solid rgba(255, 0, 170, 0.3);
    padding: 8px 20px;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  #options-overlay .options-lobby-link:hover {
    background: rgba(255, 0, 170, 0.15);
    border-color: #f0a;
    box-shadow: 0 0 15px rgba(255, 0, 170, 0.3);
  }
</style>
</head>
<body>

<div id="game-container">
  <div id="countdown-overlay">
    <div class="countdown-text" id="countdown-text">WAITING</div>
    <div class="countdown-sub" id="countdown-sub">Loading players...</div>
  </div>
  <div id="death-overlay">
    <div class="death-text">ELIMINATED</div>
    <div class="death-sub">Waiting for match to end...</div>
  </div>
  <div id="options-overlay">
    <div class="options-title">Options</div>
    <div class="options-group">
      <div class="options-label">
        <span>Master Volume</span>
        <span class="options-value" id="vol-value">100%</span>
      </div>
      <input type="range" id="opt-volume" min="0" max="100" value="100">
    </div>
    <div class="options-group">
      <div class="options-label">
        <span>Mouse Sensitivity</span>
        <span class="options-value" id="sens-value">100%</span>
      </div>
      <input type="range" id="opt-sensitivity" min="10" max="300" value="100">
    </div>
    <button class="options-resume" id="options-resume-btn">Resume</button>
    <div class="options-hint">Press <span>ESC</span> to resume</div>
    <a href="/lobby.html" class="options-lobby-link">Leave Match</a>
  </div>
  <div id="kill-feed"></div>
  <div id="player-hud"></div>
  <div id="score-overlay">
    <div class="score-title" id="score-title">VICTORY</div>
    <div class="score-mode" id="score-mode"></div>
    <table class="score-table" id="score-table"></table>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <button class="score-lobby-btn" id="rematch-btn" onclick="requestRematch()">Rematch</button>
      <button class="score-lobby-btn" onclick="window.location.href='/lobby.html'">Return to Lobby</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/engine.js"></script>
<script>
// ========================================
// TESTOSTERPWN: MULTIPLAYER
// MP-specific: networking, remote players, interpolation, scoring
// ========================================

const E = window.Engine;

// ========================================
// Auth & game data check
// ========================================
const token = sessionStorage.getItem('tp_token');
const mpUsername = sessionStorage.getItem('tp_username');
const gameId = sessionStorage.getItem('tp_gameId');
const spawnData = JSON.parse(sessionStorage.getItem('tp_spawnData') || 'null');
const gameMode = sessionStorage.getItem('tp_gameMode');
const friendlyFire = sessionStorage.getItem('tp_friendlyFire') === '1';
const mapGrid = JSON.parse(sessionStorage.getItem('tp_mapGrid') || 'null');
const mapWidth = parseInt(sessionStorage.getItem('tp_mapWidth') || '0');
const mapHeight = parseInt(sessionStorage.getItem('tp_mapHeight') || '0');

if (!token || !mpUsername || !gameId || !spawnData) {
  window.location.href = '/lobby.html';
}

// Load map into engine
if (mapGrid && mapWidth && mapHeight) {
  E.setMap(mapGrid, mapWidth, mapHeight);
}

sessionStorage.removeItem('tp_gameId');
sessionStorage.removeItem('tp_spawnData');
sessionStorage.removeItem('tp_gameMode');
sessionStorage.removeItem('tp_friendlyFire');
sessionStorage.removeItem('tp_mapGrid');
sessionStorage.removeItem('tp_mapWidth');
sessionStorage.removeItem('tp_mapHeight');

// ========================================
// Player colors
// ========================================
const PLAYER_COLORS = {
  team0: { body: '#0ff', eye: '#f00', glow: '0,255,255', name: 'Cyan' },
  team1: { body: '#f0a', eye: '#ff0', glow: '255,0,170', name: 'Magenta' },
  ffa: [
    { body: '#0ff', eye: '#f00', glow: '0,255,255', name: 'Cyan' },
    { body: '#f0a', eye: '#ff0', glow: '255,0,170', name: 'Magenta' },
    { body: '#f80', eye: '#ff0', glow: '255,136,0', name: 'Orange' },
    { body: '#0f0', eye: '#f00', glow: '0,255,0', name: 'Green' },
  ],
};

const mySpawn = spawnData[mpUsername];
if (!mySpawn) window.location.href = '/lobby.html';
const myTeam = mySpawn.team;

// ========================================
// Player state
// ========================================
const player = {
  x: mySpawn.x, y: mySpawn.y, angle: mySpawn.angle, pitch: 0,
  speed: 0.04, sprintSpeed: 0.07, crouchSpeed: 0.02, rotSpeed: E.BASE_ROT_SPEED,
  health: 100, armor: 0, ammo: 250,
  bobPhase: 0, bobAmount: 0,
  shooting: false, shootTimer: 0, shootCooldown: 21,
  muzzleFlash: 0, weaponKick: 0, damageFlash: 0,
  spread: 0, headshotIndicator: 0,
  alive: true,
  jumpZ: 0, jumpVel: 0, onGround: true,
  crouching: false, crouchOffset: 0,
};

// ========================================
// Remote players with interpolation state
// ========================================
const remotePlayers = new Map();
const playerOrder = Object.keys(spawnData);

for (const [name, sd] of Object.entries(spawnData)) {
  if (name === mpUsername) continue;

  let color;
  if (gameMode === '2v2') {
    color = sd.team === 0 ? PLAYER_COLORS.team0 : PLAYER_COLORS.team1;
  } else {
    const idx = playerOrder.indexOf(name);
    color = PLAYER_COLORS.ffa[idx % PLAYER_COLORS.ffa.length];
  }

  remotePlayers.set(name, {
    // Current rendered position
    x: sd.x, y: sd.y, angle: sd.angle,
    // Server target position
    targetX: sd.x, targetY: sd.y, targetAngle: sd.angle,
    // Previous position (for velocity estimation)
    prevX: sd.x, prevY: sd.y, prevAngle: sd.angle,
    // Estimated velocity (units per server tick, ~50ms)
    velX: 0, velY: 0,
    // Interpolation timing
    lastUpdateTime: 0,
    updateInterval: 50, // will be measured from actual updates
    interpProgress: 1, // 0-1, how far through current interpolation

    health: 100, alive: true,
    team: sd.team, color,
    hitFlash: 0,
    muzzleFlash: 0,
    crouching: false,
    jumpZ: 0, targetJumpZ: 0,
    moving: false,
    onGround: true, wasOnGround: true,
  });
}

// ========================================
// Sprite generation
// ========================================
let playerSprites = {};

function generatePlayerSprite(colorCfg) {
  return E.generateDirectionalSprites(colorCfg.body, colorCfg.eye, colorCfg.glow, 36);
}

// ========================================
// Audio system
// ========================================
const AUDIO_MAX_DIST = 15;
const FOOTSTEP_LOCAL_VOLUME = 0.4;
let masterVolume = 1.0;

const localFootstepAudio = new Audio('/audio/footsteps.mp3');
localFootstepAudio.loop = true;
localFootstepAudio.volume = FOOTSTEP_LOCAL_VOLUME;

const jumpAudio = new Audio('/audio/jump.mp3');
jumpAudio.volume = 0.5;

const shootAudio = new Audio('/audio/shoot.mp3');
shootAudio.volume = 0.5;

const doorToggleAudio = new Audio('/audio/door_toggle.mp3');
doorToggleAudio.volume = 0.5;

const glassBreakAudio = new Audio('/audio/glass_break.mp3');
glassBreakAudio.volume = 0.5;

const remoteAudio = new Map();

function initRemoteAudio(username) {
  const footstep = new Audio('/audio/footsteps.mp3');
  footstep.loop = true;
  footstep.volume = 0;
  const jump = new Audio('/audio/jump.mp3');
  jump.volume = 0;
  const shoot = new Audio('/audio/shoot.mp3');
  shoot.volume = 0;
  remoteAudio.set(username, { footstep, jump, shoot });
}

function getRemoteVolume(rp) {
  const dx = rp.x - player.x, dy = rp.y - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return Math.max(0, 1 - dist / AUDIO_MAX_DIST) * masterVolume;
}

function getPositionalVolume(wx, wy) {
  const dx = (wx + 0.5) - player.x, dy = (wy + 0.5) - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return Math.max(0, 1 - dist / AUDIO_MAX_DIST) * masterVolume;
}

function updateLocalFootsteps() {
  if (!gameActive || !player.alive || gameOver) {
    localFootstepAudio.pause();
    return;
  }
  if (player.moving) {
    localFootstepAudio.volume = FOOTSTEP_LOCAL_VOLUME * masterVolume;
    if (localFootstepAudio.paused) localFootstepAudio.play().catch(() => {});
  } else {
    localFootstepAudio.pause();
  }
}

function updateRemoteAudio() {
  for (const [username, rp] of remotePlayers) {
    const audio = remoteAudio.get(username);
    if (!audio) continue;

    const shouldPlayFootsteps = rp.alive && rp.moving && gameActive && !gameOver;
    if (shouldPlayFootsteps) {
      audio.footstep.volume = getRemoteVolume(rp) * 0.6;
      if (audio.footstep.paused) audio.footstep.play().catch(() => {});
    } else {
      audio.footstep.pause();
    }

    if (rp.alive && !rp.onGround && rp.wasOnGround && gameActive && !gameOver) {
      const vol = getRemoteVolume(rp) * 0.5;
      if (vol > 0) {
        audio.jump.volume = vol;
        audio.jump.currentTime = 0;
        audio.jump.play().catch(() => {});
      }
    }
    rp.wasOnGround = rp.onGround;
  }
}

function stopAllAudio() {
  localFootstepAudio.pause();
  jumpAudio.pause();
  shootAudio.pause();
  for (const audio of remoteAudio.values()) {
    audio.footstep.pause();
  }
}

// ========================================
// Game state
// ========================================
let gameActive = false;
let gameOver = false;
let optionsOpen = false;
let keys = {};
let showMap = false;

// ========================================
// Phaser setup
// ========================================
const game = E.initPhaser('game-container', gameCreate, gameUpdate);

function gameCreate() {
  E.initRenderCanvas(this);

  for (const [name, rp] of remotePlayers) {
    playerSprites[name] = generatePlayerSprite(rp.color);
    initRemoteAudio(name);
  }

  try { game.input.mouse.enabled = false; } catch(e) {}

  const gameCanvas = game.canvas;
  const container = document.getElementById('game-container');
  const optionsOverlay = document.getElementById('options-overlay');
  const volSlider = document.getElementById('opt-volume');
  const volValue = document.getElementById('vol-value');
  const sensSlider = document.getElementById('opt-sensitivity');
  const sensValue = document.getElementById('sens-value');

  function openOptions() {
    optionsOpen = true;
    player.shooting = false;
    keys = {};
    optionsOverlay.style.display = 'flex';
    container.classList.remove('locked');
    document.body.classList.remove('locked');
    if (document.pointerLockElement) {
      try { document.exitPointerLock(); } catch(e) {}
    }
  }

  function closeOptions() {
    optionsOpen = false;
    optionsOverlay.style.display = 'none';
    container.classList.add('locked');
    document.body.classList.add('locked');
    try { gameCanvas.requestPointerLock(); } catch(e) {}
  }

  volSlider.addEventListener('input', () => {
    masterVolume = volSlider.value / 100;
    volValue.textContent = volSlider.value + '%';
  });

  sensSlider.addEventListener('input', () => {
    player.rotSpeed = E.BASE_ROT_SPEED * (sensSlider.value / 100);
    sensValue.textContent = sensSlider.value + '%';
  });

  document.getElementById('options-resume-btn').addEventListener('click', closeOptions);

  document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement === gameCanvas) {
      optionsOpen = false;
      optionsOverlay.style.display = 'none';
      container.classList.add('locked');
      document.body.classList.add('locked');
    } else if (gameActive && !gameOver && !optionsOpen) {
      openOptions();
    }
  });

  // Input setup via shared engine
  E.setupInput({
    gameCanvas, container, player,
    getKeys: () => keys,
    shouldIgnoreInput: () => !gameActive || gameOver,
    isPaused: () => optionsOpen,
    shouldIgnoreMouseMove: () => !gameActive || !player.alive || gameOver || optionsOpen,
    onEscape: () => {
      if (!document.pointerLockElement) {
        if (optionsOpen) { closeOptions(); } else { openOptions(); }
      }
    },
    onTab: () => { showMap = !showMap; },
    onMouseDown: (e) => {
      if (!gameActive || !player.alive || gameOver || optionsOpen) return;
      if (!document.pointerLockElement) {
        try { gameCanvas.requestPointerLock(); } catch(e) {}
        return;
      }
      player.shooting = true;
    },
  });

  socket.emit('game:ready');
}

// ========================================
// Smooth Remote Player Interpolation
// ========================================
// Interpolation smoothing factor — lower = smoother but more latent
const INTERP_SMOOTHING = 0.18;

function interpolateRemotePlayers(dt) {
  const now = performance.now();

  for (const rp of remotePlayers.values()) {
    if (!rp.alive) continue;

    // Time since last server update
    const timeSinceUpdate = now - rp.lastUpdateTime;
    // Progress through expected update interval (0 to ~1+)
    const interpT = rp.updateInterval > 0 ? Math.min(timeSinceUpdate / rp.updateInterval, 2.0) : 1.0;

    if (interpT <= 1.0 && rp.lastUpdateTime > 0) {
      // Within expected interval: use Hermite interpolation for smooth curves
      // Scale velocities by update interval for proper Hermite tangent length
      const scaledVelX = rp.velX * rp.updateInterval / 1000;
      const scaledVelY = rp.velY * rp.updateInterval / 1000;
      const targetVelX = scaledVelX; // Assume velocity continues
      const targetVelY = scaledVelY;

      const hermiteX = E.hermite(interpT, rp.prevX, rp.targetX, scaledVelX, targetVelX);
      const hermiteY = E.hermite(interpT, rp.prevY, rp.targetY, scaledVelY, targetVelY);

      // Blend between hermite and exponential smoothing for stability
      const blendWeight = 0.6; // 60% hermite, 40% exponential
      const expX = E.smoothLerp(rp.x, rp.targetX, INTERP_SMOOTHING, dt);
      const expY = E.smoothLerp(rp.y, rp.targetY, INTERP_SMOOTHING, dt);

      rp.x = hermiteX * blendWeight + expX * (1 - blendWeight);
      rp.y = hermiteY * blendWeight + expY * (1 - blendWeight);
    } else {
      // Beyond expected interval or no timing data: extrapolate briefly, then smooth to target
      if (interpT <= 1.5 && rp.velX !== 0 && rp.velY !== 0) {
        // Light extrapolation: project forward using velocity
        const extrapolatedX = rp.targetX + rp.velX * (timeSinceUpdate - rp.updateInterval) / 1000;
        const extrapolatedY = rp.targetY + rp.velY * (timeSinceUpdate - rp.updateInterval) / 1000;
        // Validate extrapolation (don't go through walls)
        const mapCheckX = Math.floor(extrapolatedX);
        const mapCheckY = Math.floor(extrapolatedY);
        if (mapCheckX >= 0 && mapCheckX < E.MAP_W && mapCheckY >= 0 && mapCheckY < E.MAP_H &&
            E.MAP[mapCheckY][mapCheckX] === 0) {
          rp.x = E.smoothLerp(rp.x, extrapolatedX, INTERP_SMOOTHING, dt);
          rp.y = E.smoothLerp(rp.y, extrapolatedY, INTERP_SMOOTHING, dt);
        } else {
          rp.x = E.smoothLerp(rp.x, rp.targetX, INTERP_SMOOTHING, dt);
          rp.y = E.smoothLerp(rp.y, rp.targetY, INTERP_SMOOTHING, dt);
        }
      } else {
        // Fallback: exponential smoothing only
        rp.x = E.smoothLerp(rp.x, rp.targetX, INTERP_SMOOTHING, dt);
        rp.y = E.smoothLerp(rp.y, rp.targetY, INTERP_SMOOTHING, dt);
      }
    }

    // Angle always uses exponential smoothing (handles wrap-around)
    rp.angle = E.smoothLerpAngle(rp.angle, rp.targetAngle, INTERP_SMOOTHING, dt);
    // Jump uses exponential smoothing
    rp.jumpZ = E.smoothLerp(rp.jumpZ, rp.targetJumpZ, INTERP_SMOOTHING, dt);

    if (rp.hitFlash > 0) rp.hitFlash -= dt;
    if (rp.muzzleFlash > 0) rp.muzzleFlash -= dt;
  }
}

// ========================================
// Game update loop
// ========================================
let lastInteractKey = false;

function gameUpdate(time, delta) {
  const dt = delta / 16.666;

  if (gameActive && player.alive && !gameOver && !optionsOpen) {
    const entities = Array.from(remotePlayers.values());
    E.handleMovement(player, keys, dt, entities, masterVolume, jumpAudio);
    handleShooting(dt);

    // Door interaction (E key)
    if (keys['KeyE'] && !lastInteractKey) {
      const door = E.findNearbyDoor(player.x, player.y, player.angle);
      if (door) {
        socket.emit('game:interact', { x: door.x, y: door.y });
      }
    }
    lastInteractKey = !!keys['KeyE'];
  } else {
    E.tickShootingVisuals(player, dt);
  }

  // Smooth interpolation of remote players (frame-rate independent)
  interpolateRemotePlayers(dt);
  E.updateDoorAnimations(dt);
  E.updateWindowAnimations(dt);
  updateProjectiles(dt);

  updateLocalFootsteps();
  updateRemoteAudio();

  E.castRays(player);
  E.renderSprites(player, buildRemotePlayerEntities());
  E.renderProjectiles(player, projectiles);
  E.applyWindowOverlays();
  E.commitFrame(this);
  if (player.alive) E.renderWeapon(player);

  // Headshot indicator
  if (player.headshotIndicator > 0) {
    player.headshotIndicator -= dt;
    const hctx = E.getRenderCtx();
    hctx.save();
    hctx.globalAlpha = Math.min(1, player.headshotIndicator / 10);
    hctx.fillStyle = '#f80';
    hctx.font = 'bold 10px monospace';
    hctx.textAlign = 'center';
    hctx.fillText('HEADSHOT', E.RENDER_W / 2, E.RENDER_H / 2 + 25);
    hctx.restore();
  }

  const aliveCount = Array.from(remotePlayers.values()).filter(rp => rp.alive).length + (player.alive ? 1 : 0);
  E.renderHUD(player, {
    centerTop: gameMode.toUpperCase(),
    centerTopColor: '#0ff',
    centerBottom: `ALIVE: ${aliveCount}`,
    centerBottomColor: '#f0a',
  });

  if (showMap) {
    const mapEnts = [];
    for (const [name, rp] of remotePlayers) {
      if (!rp.alive) continue;
      if (gameMode === '2v2' && rp.team !== myTeam) continue;
      mapEnts.push({ x: rp.x, y: rp.y, color: rp.color.body, isMP: true });
    }
    E.renderMinimap(player, mapEnts);
  }

  E.updatePhaserTexture(this);
}

// ========================================
// Projectile System (visual tracers)
// ========================================
const projectiles = [];

function spawnProjectile(x, y, angle) {
  projectiles.push({ x, y, angle, speed: 1.5, life: 40 });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += Math.cos(p.angle) * p.speed * dt;
    p.y += Math.sin(p.angle) * p.speed * dt;
    p.life -= dt;
    const mx = Math.floor(p.x), my = Math.floor(p.y);
    if (mx < 0 || mx >= E.MAP_W || my < 0 || my >= E.MAP_H || p.life <= 0) {
      projectiles.splice(i, 1);
    } else if (E.MAP[my][mx] > 0) {
      if (E.MAP[my][mx] === 11 && E.isWindowBroken(mx, my)) {
        // broken window - projectile passes through
      } else if (E.MAP[my][mx] === 10 && E.isDoorGap(mx, my, p.x, p.y, p.angle)) {
        // door gap - projectile passes through
      } else {
        if (E.MAP[my][mx] === 11) {
          socket.emit('game:shootWindow', { x: mx, y: my });
        }
        projectiles.splice(i, 1);
      }
    }
  }
}

// ========================================
// MP Shooting
// ========================================
function handleShooting(dt) {
  E.tickShootingVisuals(player, dt);

  if (player.shooting && player.shootTimer <= 0 && player.ammo > 0) {
    E.fireWeapon(player, shootAudio, masterVolume);

    // Spawn visible tracer projectile (with spread)
    const spreadAngle = (Math.random() - 0.5) * (player.spread || 0) * 0.015;
    const spawnDist = 0.5;
    spawnProjectile(
      player.x + Math.cos(player.angle) * spawnDist,
      player.y + Math.sin(player.angle) * spawnDist,
      player.angle + spreadAngle
    );

    // Notify other players of the shot (for audio + muzzle flash)
    socket.volatile.emit('game:fire');

    const hit = castHitscan();
    if (hit) {
      socket.emit('game:shoot', { target: hit.username, headshot: hit.headshot });
    }
  }
}

function castHitscan() {
  let closest = null;
  let closestDist = Infinity;
  // Apply bullet spread to effective aim point
  const spread = player.spread || 0;
  const cx = E.RENDER_W / 2 + (Math.random() - 0.5) * spread * 3;
  const cy = E.RENDER_H / 2 + (Math.random() - 0.5) * spread * 3;
  const bobOffset = Math.sin(player.bobPhase) * 2 * player.bobAmount;
  const wallOffset = player.jumpZ * 55 - player.crouchOffset * 25;

  for (const [name, rp] of remotePlayers) {
    if (!rp.alive) continue;
    const dx = rp.x - player.x, dy = rp.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    let angle = Math.atan2(dy, dx) - player.angle;
    while (angle > Math.PI) angle -= 2 * Math.PI;
    while (angle < -Math.PI) angle += 2 * Math.PI;

    if (Math.abs(angle) < E.FOV / 2) {
      const screenX = (E.RENDER_W / 2) + (angle / E.HALF_FOV) * (E.RENDER_W / 2);
      const baseH = Math.min(E.RENDER_H * 1.5, (E.RENDER_H / dist) * 0.8);
      const halfW = baseH * 0.4;

      if (cx >= screenX - halfW && cx <= screenX + halfW && dist < closestDist) {
        const crouchScale = rp.crouching ? 0.6 : 1.0;
        const spriteH = baseH * crouchScale;
        const remoteJumpOffset = rp.jumpZ * 55 / Math.max(dist, 0.3);
        const spriteBottom = cy + baseH / 2 + bobOffset + player.pitch + wallOffset - remoteJumpOffset;
        const spriteTop = spriteBottom - spriteH;

        if (cy >= spriteTop && cy <= spriteBottom) {
          if (E.hasLineOfSight(player.x, player.y, rp.x, rp.y)) {
            closestDist = dist;
            const headBoundary = spriteTop + spriteH * 0.25;
            closest = { username: name, dist, headshot: cy < headBoundary };
          }
        }
      }
    }
  }
  return closest;
}

// ========================================
// Build remote player render list
// ========================================
function buildRemotePlayerEntities() {
  const sorted = [];
  for (const [name, rp] of remotePlayers) {
    if (!rp.alive) continue;
    const dx = rp.x - player.x, dy = rp.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const dir = E.getSpriteDir(rp.angle, player.x, player.y, rp.x, rp.y);
    const spriteArr = playerSprites[name];
    if (!spriteArr) continue;
    const spriteInfo = spriteArr[dir];
    if (!spriteInfo) continue;
    sorted.push({
      dist, dx, dy,
      spriteData: spriteInfo.data.data,
      hitFlash: rp.hitFlash > 0 ? Math.min(1, rp.hitFlash / 5) : 0,
      muzzleFlash: rp.muzzleFlash > 0 ? rp.muzzleFlash : 0,
      jumpZ: rp.jumpZ,
      crouching: rp.crouching,
    });
  }
  sorted.sort((a, b) => b.dist - a.dist);
  return sorted;
}

// ========================================
// Player HUD (top-right health bars)
// ========================================
function updatePlayerHUD() {
  const hud = document.getElementById('player-hud');
  let html = '';

  const allPlayers = [
    { username: mpUsername, health: player.health, alive: player.alive, team: myTeam, self: true },
    ...Array.from(remotePlayers.entries()).map(([name, rp]) => ({
      username: name, health: rp.health, alive: rp.alive, team: rp.team, self: false,
      color: rp.color,
    })),
  ];

  allPlayers.sort((a, b) => {
    if (a.self) return -1;
    if (b.self) return 1;
    if (a.team !== b.team) return a.team - b.team;
    return a.username.localeCompare(b.username);
  });

  for (const p of allPlayers) {
    let nameColor;
    if (gameMode === '2v2') nameColor = p.team === 0 ? '#0ff' : '#f0a';
    else if (p.self) nameColor = '#fff';
    else nameColor = p.color ? p.color.body : '#0f0';

    const hpPct = Math.max(0, p.health);
    const hpColor = p.health > 30 ? '#0f0' : '#f44';
    const deadClass = p.alive ? '' : ' phud-dead';

    html += '<div class="phud-entry' + deadClass + '">' +
      '<span class="phud-name" style="color:' + nameColor + '">' + E.escapeHtml(p.username) + '</span>' +
      '<div class="phud-hp-bar"><div class="phud-hp-fill" style="width:' + hpPct + '%;background:' + hpColor + '"></div></div>' +
    '</div>';
  }

  hud.innerHTML = html;
}

// ========================================
// Kill feed
// ========================================
function addKillFeedEntry(killer, victim, headshot) {
  const feed = document.getElementById('kill-feed');
  const el = document.createElement('div');
  el.className = 'kill-feed-entry';
  if (killer) {
    const hsTag = headshot ? ' <span class="kf-hs">[HS]</span>' : '';
    el.innerHTML = '<span class="kf-killer">' + E.escapeHtml(killer) + '</span>' +
      hsTag + ' <span class="kf-arrow">&gt;</span> ' +
      '<span class="kf-victim">' + E.escapeHtml(victim) + '</span>';
  } else {
    el.innerHTML = '<span class="kf-victim">' + E.escapeHtml(victim) + '</span> disconnected';
  }
  feed.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 500);
  }, 5000);
}

// ========================================
// Score screen
// ========================================
function showScoreScreen(result, stats, mode) {
  const overlay = document.getElementById('score-overlay');
  const titleEl = document.getElementById('score-title');
  const modeEl = document.getElementById('score-mode');
  const tableEl = document.getElementById('score-table');

  let titleText, titleClass;
  if (mode === '2v2') {
    if (result.winnerTeam === myTeam) {
      titleText = 'VICTORY'; titleClass = 'victory';
    } else {
      titleText = 'DEFEAT'; titleClass = 'defeat';
    }
  } else {
    if (result.winner === mpUsername) {
      titleText = 'VICTORY'; titleClass = 'victory';
    } else if (result.winner === null) {
      titleText = 'DRAW'; titleClass = 'draw';
    } else {
      titleText = 'DEFEAT'; titleClass = 'defeat';
    }
  }

  titleEl.textContent = titleText;
  titleEl.className = 'score-title ' + titleClass;
  modeEl.textContent = mode.toUpperCase() + ' MATCH';

  let html = '<thead><tr><th>Operator</th>' +
    (mode === '2v2' ? '<th>Team</th>' : '') +
    '<th>Kills</th><th>Deaths</th><th>HS</th><th>Damage</th></tr></thead><tbody>';

  stats.sort((a, b) => b.kills - a.kills || a.deaths - b.deaths);
  for (const s of stats) {
    const isSelf = s.username === mpUsername;
    const nameClass = isSelf ? 'st-self' : (mode === '2v2' ? (s.team === 0 ? 'st-team0' : 'st-team1') : 'st-name');
    html += '<tr>' +
      '<td class="' + nameClass + '">' + E.escapeHtml(s.username) + '</td>' +
      (mode === '2v2' ? '<td class="' + (s.team === 0 ? 'st-team0' : 'st-team1') + '">' + (s.team === 0 ? 'CYAN' : 'MAGENTA') + '</td>' : '') +
      '<td class="st-kills">' + s.kills + '</td>' +
      '<td class="st-deaths">' + s.deaths + '</td>' +
      '<td class="st-headshots">' + (s.headshots || 0) + '</td>' +
      '<td class="st-damage">' + s.damageDealt + '</td>' +
    '</tr>';
  }
  html += '</tbody>';
  tableEl.innerHTML = html;

  overlay.style.display = 'flex';

  if (document.pointerLockElement) {
    try { document.exitPointerLock(); } catch(e) {}
  }
}

// ========================================
// Socket.IO networking (optimized)
// ========================================
const socket = io({
  auth: { token, gameId }
});

socket.on('connect_error', (err) => {
  if (err.message === 'Authentication required') {
    window.location.href = '/';
  }
});

socket.on('game:error', (data) => {
  alert(data.message);
  window.location.href = '/lobby.html';
});

// Countdown phase
socket.on('game:countdown', () => {
  const textEl = document.getElementById('countdown-text');
  const subEl = document.getElementById('countdown-sub');
  subEl.textContent = 'Get ready!';
  let count = 3;
  textEl.textContent = count;
  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      textEl.textContent = count;
    } else {
      clearInterval(interval);
      textEl.textContent = 'FIGHT!';
    }
  }, 1000);
});

// Game starts
socket.on('game:go', () => {
  document.getElementById('countdown-overlay').style.display = 'none';
  const container = document.getElementById('game-container');
  container.classList.add('locked');
  document.body.classList.add('locked');
  gameActive = true;
  try { game.canvas.requestPointerLock(); } catch(e) {}

  // State broadcast — use volatile emit so stale updates are dropped under backpressure.
  // 20Hz tick rate (50ms) with binary-packed data for efficiency.
  let lastSentState = null;

  setInterval(() => {
    if (!gameActive || !player.alive || gameOver) return;

    // Delta compression: only send full state if something meaningful changed
    const newState = {
      x: Math.round(player.x * 100) / 100,
      y: Math.round(player.y * 100) / 100,
      angle: Math.round(player.angle * 1000) / 1000,
      crouching: player.crouching,
      jumpZ: Math.round(player.jumpZ * 100) / 100,
      moving: player.moving,
      onGround: player.onGround,
    };

    // Pack boolean flags into a single byte for efficiency
    const flags = (newState.crouching ? 1 : 0) |
                  (newState.moving ? 2 : 0) |
                  (newState.onGround ? 4 : 0);

    // Skip if nothing changed (position + angle + flags all same)
    if (lastSentState &&
        newState.x === lastSentState.x &&
        newState.y === lastSentState.y &&
        newState.angle === lastSentState.angle &&
        newState.jumpZ === lastSentState.jumpZ &&
        flags === lastSentState.flags) {
      return;
    }

    lastSentState = { ...newState, flags };

    // Use volatile emit — if the transport is backlogged, skip this update
    // rather than queuing stale state
    socket.volatile.emit('game:state', {
      x: newState.x,
      y: newState.y,
      angle: newState.angle,
      crouching: newState.crouching,
      jumpZ: newState.jumpZ,
      moving: newState.moving,
      onGround: newState.onGround,
    });
  }, 50); // 20Hz (up from 15Hz for smoother remote player updates)

  setInterval(updatePlayerHUD, 200);
});

// Remote player state updates — with velocity estimation for interpolation
socket.on('game:playerState', (data) => {
  const rp = remotePlayers.get(data.username);
  if (!rp) return;

  const now = performance.now();

  // Measure actual update interval for interpolation timing
  if (rp.lastUpdateTime > 0) {
    const measured = now - rp.lastUpdateTime;
    // Exponential moving average of update interval (smooth out jitter)
    rp.updateInterval = rp.updateInterval * 0.7 + measured * 0.3;
  }

  // Store previous position for Hermite interpolation
  rp.prevX = rp.x;
  rp.prevY = rp.y;
  rp.prevAngle = rp.angle;

  // Estimate velocity from position delta (units per second)
  if (rp.lastUpdateTime > 0) {
    const elapsed = (now - rp.lastUpdateTime) / 1000;
    if (elapsed > 0) {
      rp.velX = (data.x - rp.targetX) / elapsed;
      rp.velY = (data.y - rp.targetY) / elapsed;
    }
  }

  rp.lastUpdateTime = now;

  // Update targets
  rp.targetX = data.x;
  rp.targetY = data.y;
  rp.targetAngle = data.angle;
  rp.health = data.health;
  rp.crouching = !!data.crouching;
  rp.targetJumpZ = typeof data.jumpZ === 'number' ? data.jumpZ : 0;
  rp.moving = !!data.moving;
  rp.onGround = !!data.onGround;
});

// Remote player fired weapon (audio + muzzle flash + tracer)
socket.on('game:playerFire', (data) => {
  const rp = remotePlayers.get(data.username);
  if (!rp || !rp.alive) return;

  // Muzzle flash on their sprite
  rp.muzzleFlash = 4;

  // Spawn visible tracer from their position
  spawnProjectile(
    rp.x + Math.cos(rp.angle) * 0.5,
    rp.y + Math.sin(rp.angle) * 0.5,
    rp.angle
  );

  // Remote audio
  const audio = remoteAudio.get(data.username);
  if (!audio) return;
  const vol = getRemoteVolume(rp) * 0.5;
  if (vol > 0) {
    audio.shoot.volume = vol;
    audio.shoot.currentTime = 0;
    audio.shoot.play().catch(() => {});
  }
});

// Door toggled
socket.on('game:doorToggle', (data) => {
  E.setDoorState(data.x, data.y, data.open);
  const vol = getPositionalVolume(data.x, data.y);
  if (vol > 0) {
    doorToggleAudio.currentTime = 0;
    doorToggleAudio.volume = vol;
    doorToggleAudio.play().catch(() => {});
  }
});

// Window broken
socket.on('game:windowBreak', (data) => {
  E.breakWindow(data.x, data.y);
  const vol = getPositionalVolume(data.x, data.y);
  if (vol > 0) {
    glassBreakAudio.currentTime = 0;
    glassBreakAudio.volume = vol;
    glassBreakAudio.play().catch(() => {});
  }
});

// Player was hit
socket.on('game:playerHit', (data) => {
  if (data.target === mpUsername) {
    player.health = data.newHealth;
    player.damageFlash = data.headshot ? 10 : 6;
  } else {
    const rp = remotePlayers.get(data.target);
    if (rp) {
      rp.health = data.newHealth;
      rp.hitFlash = 8;
    }
    // Headshot indicator for shooter
    if (data.shooter === mpUsername && data.headshot) {
      player.headshotIndicator = 40;
    }
  }
});

// Player killed
socket.on('game:playerKill', (data) => {
  addKillFeedEntry(data.killer, data.victim, data.headshot);

  if (data.victim === mpUsername) {
    player.alive = false;
    player.health = 0;
    player.moving = false;
    document.getElementById('death-overlay').style.display = 'flex';
    player.shooting = false;
    localFootstepAudio.pause();
  } else {
    const rp = remotePlayers.get(data.victim);
    if (rp) {
      rp.alive = false;
      rp.health = 0;
    }
  }
  updatePlayerHUD();
});

// Game over
socket.on('game:over', (data) => {
  gameOver = true;
  gameActive = false;
  player.shooting = false;
  player.moving = false;
  keys = {};
  stopAllAudio();
  document.getElementById('death-overlay').style.display = 'none';
  showScoreScreen(data.result, data.stats, data.mode);
});

// ========================================
// Rematch
// ========================================
let rematchRequested = false;

function requestRematch() {
  if (rematchRequested) return;
  rematchRequested = true;
  socket.emit('game:rematch');
  const btn = document.getElementById('rematch-btn');
  btn.style.opacity = '0.6';
  btn.style.cursor = 'default';
  btn.textContent = 'VOTED...';
}

socket.on('game:rematchUpdate', (data) => {
  const btn = document.getElementById('rematch-btn');
  if (!btn) return;
  if (rematchRequested) {
    btn.textContent = 'REMATCH ' + data.count + '/' + data.total;
  } else {
    btn.textContent = 'Rematch ' + data.count + '/' + data.total;
  }
});

socket.on('game:rematchStarting', (data) => {
  sessionStorage.setItem('tp_gameId', data.gameId);
  sessionStorage.setItem('tp_spawnData', JSON.stringify(data.spawnData));
  sessionStorage.setItem('tp_gameMode', data.mode);
  sessionStorage.setItem('tp_friendlyFire', data.friendlyFire ? '1' : '0');
  sessionStorage.setItem('tp_mapGrid', JSON.stringify(data.mapGrid));
  sessionStorage.setItem('tp_mapWidth', String(data.mapWidth));
  sessionStorage.setItem('tp_mapHeight', String(data.mapHeight));
  window.location.href = '/mp-game.html';
});
